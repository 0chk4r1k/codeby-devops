name: CI Pipeline

on:
  push:
    branches: [ "lesson28" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [HelloWorld, HelloJenkins, HelloDevops]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: mvn clean package
        working-directory: lesson26/${{ matrix.app }}

      - name: Test
        run: mvn test
        working-directory: lesson26/${{ matrix.app }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-jar
          path: lesson26/${{ matrix.app }}/target/*.jar

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest lesson26/${{ matrix.app }}

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
